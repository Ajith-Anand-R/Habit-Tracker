name: EAS Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_LOCAL_BUILD_ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci

      - name: Install tools (jq, EAS & Expo CLI)
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          npm install -g eas-cli expo-cli

      - name: Show EAS and Expo versions
        run: |
          eas --version
          expo --version || true

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        if: env.KEYSTORE_BASE64 != ''
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/habit.keystore

      - name: Configure Keystore Credentials
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_PASSWORD" ]; then echo "EXPO_ANDROID_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> $GITHUB_ENV; fi
          if [ -n "$KEY_ALIAS" ]; then echo "EXPO_ANDROID_KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV; fi
          if [ -n "$KEY_PASSWORD" ]; then echo "EXPO_ANDROID_KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV; fi

      - name: Write credentials.json
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > credentials.json <<EOF
          {
            "android": {
              "keystore": {
                "keystorePath": "android/app/habit.keystore",
                "keystorePassword": "$KEYSTORE_PASSWORD",
                "keyAlias": "$KEY_ALIAS",
                "keyPassword": "$KEY_PASSWORD"
              }
            }
          }
          EOF

      - name: Run EAS Build (Android APK)
        id: eas_build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # local signing credentials will be read from GITHUB_ENV variables set above
        run: |
          set -e
          echo "Starting EAS build (using local credentials)..."
          eas build -p android --profile production --non-interactive --local --json > build.json
          echo "build.json contents:" && cat build.json
          APK_PATH=$(find "$EAS_LOCAL_BUILD_ARTIFACTS_DIR" -name '*.apk' -type f | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found in $EAS_LOCAL_BUILD_ARTIFACTS_DIR" >&2
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: habit-tracker-apk
          path: ${{ env.APK_PATH }}
